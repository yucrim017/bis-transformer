on:
  push:
    branches:
      - dev/**

name: Docker Build and Push

jobs:
  publish_docker_image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker Image
        run: |
          docker build -f docker/mlflow-aws.Dockerfile \
          -t ghcr.io/$GITHUB_ACTOR/bis-transformer:latest \
          -t ghcr.io/$GITHUB_ACTOR/bis-transformer:$(echo $GITHUB_SHA | head -c7) \
          .
      - name: Push Docker Image
        run: |
          docker push ghcr.io/$GITHUB_ACTOR/bis-transformer:latest
          docker push ghcr.io/$GITHUB_ACTOR/bis-transformer:$(echo $GITHUB_SHA | head -c7)