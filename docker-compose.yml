# version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: mlflow-postgres
    environment:
      POSTGRES_USER: ${PGUSER}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDB}
    ports:
      - "${PGPORT}:5432"
    volumes:
      - ./mlflow-stack/pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER} -d ${PGDB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: mlflow-minio
    environment:
      MINIO_ROOT_USER: "minio"
      MINIO_ROOT_PASSWORD: "dev-password"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - ./mlflow-stack/minio:/data
  
  minio-mc:
    image: minio/mc:latest
    container_name: minio-mc
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/${MINIO_BUCKET} || true
      "
    restart: "no"

  mlflow-server:
    build:
      context: ./docker
      dockerfile: mlflow-local.Dockerfile
    # image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow-server
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      minio-mc:
        condition: service_completed_successfully
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "${MLFLOW_PORT}:5000"
    restart: unless-stopped
    command: 
      [
        "mlflow", "server",
        "--host", "0.0.0.0",
        "--port", "5000",
        "--backend-store-uri", "postgresql+psycopg2://${PGUSER}:${PGPASSWORD}@postgres:${PGPORT}/${PGDB}",
        "--default-artifact-root", "s3://${MINIO_BUCKET}/${DEFAULT_ARTIFACT_ROOT}"
      ]